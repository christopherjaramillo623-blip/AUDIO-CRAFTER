<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hashbrown</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080808;
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
    }

    /* Stars */
    .stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse at 20% 80%, rgba(60,0,80,.15) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(0,30,80,.12) 0%, transparent 60%);
    }
    .stars::before, .stars::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 30%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 75%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 65%, rgba(255,255,255,.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 85%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 50%, rgba(255,255,255,.25) 0%, transparent 100%);
    }

    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 340px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Card base */
    .card {
      background: rgba(18,18,18,.85);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 18px;
      padding: 18px;
      backdrop-filter: blur(12px);
    }

    /* ── Profile card ── */
    .profile-card {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .pfp {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: #000;
      border: 2px solid rgba(255,255,255,.1);
      flex-shrink: 0;
    }
    .profile-info { flex: 1; }
    .zodiac-line {
      font-size: 11px;
      color: rgba(255,255,255,.4);
      letter-spacing: .05em;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .zodiac-line .sign { font-size: 13px; }
    .name {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -.01em;
      line-height: 1.2;
    }
    .username {
      font-size: 12px;
      color: rgba(255,255,255,.35);
      margin-top: 2px;
    }

    /* ── Quote ── */
    .quote-card {
      font-size: 13px;
      color: rgba(255,255,255,.55);
      font-style: italic;
      line-height: 1.6;
      min-height: 22px;
    }
    #quote-cursor {
      display: inline-block;
      width: 1px; height: 13px;
      background: rgba(255,255,255,.5);
      vertical-align: middle;
      animation: blink .7s step-end infinite;
      margin-left: 1px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Languages ── */
    .section-label {
      font-size: 10px;
      letter-spacing: .12em;
      color: rgba(255,255,255,.3);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .lang-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: rgba(255,255,255,.75);
    }
    .flag { font-size: 18px; }

    /* ── Interests ── */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }
    .tag {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 12px;
      color: rgba(255,255,255,.7);
      white-space: nowrap;
    }

    /* ── Music Player ── */
    .player-card {}
    .song-meta { margin-bottom: 12px; }
    .song-title {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .song-artist {
      font-size: 11px;
      color: rgba(255,255,255,.4);
      margin-top: 2px;
    }

    /* Timeline */
    .timeline-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .time-label {
      font-size: 10px;
      color: rgba(255,255,255,.35);
      font-family: 'Space Mono', monospace;
      white-space: nowrap;
      width: 32px;
    }
    .time-label.right { text-align: right; }
    input[type=range] {
      -webkit-appearance: none;
      flex: 1;
      height: 3px;
      border-radius: 99px;
      background: rgba(255,255,255,.12);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      transition: transform .1s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,.6);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .15s, transform .1s;
      padding: 4px;
    }
    .ctrl-btn:hover { color: #fff; transform: scale(1.1); }
    .ctrl-btn.play {
      width: 40px; height: 40px;
      background: rgba(255,255,255,.1);
      border-radius: 50%;
      color: #fff;
    }
    .ctrl-btn.play:hover { background: rgba(255,255,255,.18); }

    svg { display: block; }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="container">

    <!-- Profile -->
    <div class="card profile-card">
      <div class="pfp"></div>
      <div class="profile-info">
        <div class="zodiac-line">
          <span class="sign">♋</span>
          <span>Cancer · June 23</span>
        </div>
        <div class="name">Hashbrown</div>
        <div class="username">@hashbrownalt</div>
      </div>
    </div>

    <!-- Quote -->
    <div class="card quote-card">
      <span id="quote-text"></span><span id="quote-cursor"></span>
    </div>

    <!-- Languages -->
    <div class="card">
      <div class="section-label">Languages</div>
      <div class="lang-row">
        <span class="flag">🇬🇧</span>
        <span>English</span>
      </div>
    </div>

    <!-- Interests -->
    <div class="card">
      <div class="section-label">Interests</div>
      <div class="tags">
        <span class="tag">Lua / Luau</span>
        <span class="tag">CSS beginner</span>
        <span class="tag">Horror movies</span>
      </div>
    </div>

    <!-- Music Player -->
    <div class="card player-card">
      <div class="section-label">Now Playing</div>
      <div class="song-meta">
        <div class="song-title" id="song-title">Genie In a Bottle (Lyrics)</div>
        <div class="song-artist" id="song-artist">Loading…</div>
      </div>
      <div class="timeline-wrap">
        <span class="time-label" id="time-cur">0:00</span>
        <input type="range" id="seek" min="0" max="100" value="0" step="0.1" />
        <span class="time-label right" id="time-dur">0:00</span>
      </div>
      <div class="controls">
        <!-- Skip back -->
        <button class="ctrl-btn" id="btn-prev" title="Previous">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
          </svg>
        </button>
        <!-- Play/Pause -->
        <button class="ctrl-btn play" id="btn-play" title="Play / Pause">
          <svg id="icon-play" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <svg id="icon-pause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </button>
        <!-- Skip forward -->
        <button class="ctrl-btn" id="btn-next" title="Next">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 3.9V8.1L8.5 12zM16 6h2v12h-2z"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <audio id="audio"></audio>

  <script>
    /* ── Typewriter quote ── */
    const quoteStr = "You can't trust anyone.";
    const quoteEl  = document.getElementById('quote-text');
    let qi = 0;
    function typeQuote() {
      if (qi <= quoteStr.length) {
        quoteEl.textContent = quoteStr.slice(0, qi);
        qi++;
        setTimeout(typeQuote, qi === 1 ? 600 : 55);
      } else {
        document.getElementById('quote-cursor').style.display = 'none';
      }
    }
    setTimeout(typeQuote, 800);

    /* ── Music player ── */
    const songs = [
      {
        url:    'https://raw.githubusercontent.com/ACAUDIOCRAFTER/AUDIO-CRAFTER/refs/heads/main/songs/Genie%20In%20a%20Bottle%20(Lyrics).mp3',
        title:  'Genie In a Bottle',
        artist: 'Christina Aguilera'
      },
      {
        url:    'https://raw.githubusercontent.com/ACAUDIOCRAFTER/AUDIO-CRAFTER/refs/heads/main/songs/Trey%20Songz%20-%20Na%20Na%20(Clean).mp3',
        title:  'Na Na (Clean)',
        artist: 'Trey Songz'
      }
    ];

    const audio    = document.getElementById('audio');
    const seekBar  = document.getElementById('seek');
    const timeCur  = document.getElementById('time-cur');
    const timeDur  = document.getElementById('time-dur');
    const titleEl  = document.getElementById('song-title');
    const artistEl = document.getElementById('song-artist');
    const iconPlay = document.getElementById('icon-play');
    const iconPause= document.getElementById('icon-pause');
    let current = 0, playing = false, seeking = false;

    function fmt(s) {
      if (isNaN(s) || !isFinite(s)) return '0:00';
      const m = Math.floor(s / 60), ss = Math.floor(s % 60);
      return m + ':' + String(ss).padStart(2, '0');
    }

    function load(idx) {
      current = idx;
      const s = songs[idx];
      titleEl.textContent  = s.title;
      artistEl.textContent = s.artist;
      audio.src = s.url;
      seekBar.value = 0;
      timeCur.textContent = '0:00';
      timeDur.textContent = '0:00';
      if (playing) audio.play().catch(() => {});
    }

    function setPlayUI(state) {
      playing = state;
      iconPlay.style.display  = state ? 'none'  : 'block';
      iconPause.style.display = state ? 'block' : 'none';
    }

    document.getElementById('btn-play').addEventListener('click', () => {
      if (audio.paused) {
        audio.play().then(() => setPlayUI(true)).catch(() => {});
      } else {
        audio.pause();
        setPlayUI(false);
      }
    });

    document.getElementById('btn-next').addEventListener('click', () => {
      load((current + 1) % songs.length);
    });

    document.getElementById('btn-prev').addEventListener('click', () => {
      if (audio.currentTime > 3) {
        audio.currentTime = 0;
      } else {
        load((current - 1 + songs.length) % songs.length);
      }
    });

    audio.addEventListener('timeupdate', () => {
      if (seeking) return;
      const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
      seekBar.value = pct;
      timeCur.textContent = fmt(audio.currentTime);
      timeDur.textContent = fmt(audio.duration);
    });

    audio.addEventListener('ended', () => {
      load((current + 1) % songs.length);
      audio.play().then(() => setPlayUI(true)).catch(() => {});
    });

    seekBar.addEventListener('mousedown', () => { seeking = true; });
    seekBar.addEventListener('input', () => {
      if (audio.duration) {
        timeCur.textContent = fmt(audio.duration * (seekBar.value / 100));
      }
    });
    seekBar.addEventListener('change', () => {
      if (audio.duration) audio.currentTime = audio.duration * (seekBar.value / 100);
      seeking = false;
    });

    /* initial load + autoplay */
    load(0);
    audio.play().then(() => setPlayUI(true)).catch(() => {
      const unlock = () => {
        audio.play().then(() => setPlayUI(true)).catch(() => {});
        document.removeEventListener('click', unlock);
      };
      document.addEventListener('click', unlock);
    });
  </script>
</body>
</html>
